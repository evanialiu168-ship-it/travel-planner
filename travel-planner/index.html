<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Travel Planner</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>

        body{
            margin:0;
        }

        #map{
            height:100vh;
            width:100%;
        }

    </style>

</head>

<body>

<div class="flex h-screen">

    <!-- 地图 -->

    <div class="w-2/3">

        <div id="map"></div>

    </div>

    <!-- 侧边栏 -->

    <div class="w-1/3 bg-slate-50 p-6 overflow-y-auto">

        <h1 class="text-3xl font-bold mb-6">
            ✈️ Travel Planner
        </h1>

        <input
            id="city"
            type="text"
            placeholder="输入城市（东京、大阪、首尔）"
            class="w-full border p-3 rounded-xl mb-3">

        <input
            id="days"
            type="number"
            placeholder="旅行天数"
            class="w-full border p-3 rounded-xl mb-3">

        <textarea
            id="spots"
            placeholder="想去的景点（每行一个）"
            rows="4"
            class="w-full border p-3 rounded-xl mb-3"></textarea>

        <button
            onclick="generatePlan()"
            class="w-full bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700">

            生成旅行计划

        </button>

        <div id="result" class="mt-6"></div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>

</body>

</html>
